<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlimentTICO - Mi Perfil Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/admin.css">
    <script src="../js/admin.js"></script>
</head>

<body>

    <!-- Boton del sidebar solo para celular -->
    <button class="btn-sidebar" id="btnSidebar">☰</button>

    <div class="layout">

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-top">
                <h2 class="logo-texto">AlimenTICO <img src="../img/donacion-de-alimentos.png" alt="logo" height="40px">
                </h2>
                <button class="btn-cerrar-sidebar" id="btnCerrarSidebar">✕</button>
            </div>
            <nav class="sidebar-nav">
                <a href="admin-panel.html" class="sidebar-link activo">Panel Principal</a>
                <a href="admin-beneficiarios.html" class="sidebar-link">Donaciones</a>
                <a href="admin-restaurantes.html" class="sidebar-link">Restaurantes</a>
                <a href="admin-perfil.html" class="sidebar-link">Perfil</a>
                <a href="../login.html" class="sidebar-link">Cerrar Sesión</a>
            </nav>
        </aside>

        <main class="panel-contenido">

            <h1 class="titulo-panel">MI PERFIL</h1>

            <form id="formPerfil">
                <div class="formulario-card">
                    <div class="row">

                        <div class="col-md-6 col-izquierda">

                            <h5 class="seccion-titulo">INFORMACIÓN PERSONAL</h5>

                            <div class="campo">
                                <label for="nombreCompleto" class="label-campo">Nombre Completo</label>
                                <input type="text" class="campo-input" id="nombreCompleto" name="nombreCompleto" value="Juan Carlos Ramirez">
                            </div>

                            <div class="campo">
                                <label for="cedulaIdentidad" class="label-campo">Cedula de Identidad</label>
                                <input type="text" class="campo-input" id="cedulaIdentidad" name="cedulaIdentidad" value="1-2003-2392">
                            </div>

                            <div class="campo">
                                <label for="telefono" class="label-campo">Teléfono</label>
                                <input type="text" class="campo-input" id="telefono" name="telefono" value="7387-3930">
                            </div>

                            <h5 class="seccion-titulo">INFORMACIÓN PERSONAL</h5>

                            <div class="campo">
                                <label for="correo" class="label-campo">Correo Electrónico</label>
                                <input type="email" class="campo-input" id="correo" name="correo" value="macdonald@gmail.com">
                            </div>

                            <div class="campo">
                                <label for="contrasena" class="label-campo">Contraseña</label>
                                <input type="password" class="campo-input" id="contrasena" name="contrasena" placeholder="Dejar vacío para no cambiar">
                            </div>

                             <div class="boton-accion">
                                <button type="button" class="btn-accion" id="btnCambiarContrasena">Cambiar Contraseña</button>
                            </div>

                            <div class="boton-accion">
                                <button type="button" class="btn-accion" id="btnGuardarCambios">Guardar Cambios</button>
                            </div>

                            <div class="boton-accion">
                                <button type="button" class="btn-accion" id="btnEliminarPerfil">Eliminar Perfil</button>
                            </div>

                        </div>
                    </div>
                </div>

            </form>

        </main>
    </div>

</body>

</html>
