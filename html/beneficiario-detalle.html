<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlimenTICO - Detalle de Donación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/beneficiario.css">
    <script src="../js/beneficiario.js"></script>
</head>

<body>

    <button class="btn-sidebar" id="btnSidebar">☰</button>

    <div class="layout">

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-top">
                <h2 class="logo-texto">AlimenTICO <img src="../img/donacion-de-alimentos.png" alt="logo" height="40px"></h2>
                <button class="btn-cerrar-sidebar" id="btnCerrarSidebar">✕</button>
            </div>
            <nav class="sidebar-nav">
                <a href="beneficiario-panel.html" class="sidebar-link">Donaciones Disponibles</a>
                <a href="beneficiario-reservas.html" class="sidebar-link">Mis Reservas</a>
                <a href="beneficiario-perfil.html" class="sidebar-link">Mi Perfil</a>
                <a href="../login.html" class="sidebar-link">Cerrar Sesión</a>
            </nav>
        </aside>

        <main class="panel-contenido">

            <a href="beneficiario-panel.html" class="btn-volver">← Volver a donaciones</a>

            <div class="formulario-card" style="margin-top: 20px;">

                <div class="row">

                    <div class="col-md-6">
                        <h1 class="titulo-detalle">Arroz con pollo</h1>

                        <h5 class="seccion-titulo">INFORMACIÓN DE LA DONACIÓN</h5>

                        <div class="campo">
                            <label class="label-campo">Donado por</label>
                            <input type="text" class="campo-input" value="Restaurante La Casa" disabled>
                        </div>

                        <div class="campo">
                            <label class="label-campo">Tipo de alimento</label>
                            <input type="text" class="campo-input" value="Comida preparada" disabled>
                        </div>

                        <div class="campo">
                            <label class="label-campo">Cantidad</label>
                            <input type="text" class="campo-input" value="10 porciones" disabled>
                        </div>

                        <div class="campo">
                            <label class="label-campo">Disponible hasta</label>
                            <input type="text" class="campo-input" value="19/03/2026" disabled>
                        </div>

                        <div class="campo">
                            <label class="label-campo">Hora límite</label>
                            <input type="text" class="campo-input" value="8:00 PM" disabled>
                        </div>

                        <div class="campo">
                            <label class="label-campo">Estado</label>
                            <input type="text" class="campo-input" value="Disponible" disabled>
                        </div>
                    </div>

                    <div class="col-md-6">

                        <h5 class="seccion-titulo">UBICACIÓN</h5>

                        <div class="campo">
                            <label class="label-campo">Dirección</label>
                            <input type="text" class="campo-input" value="San José, Calle Central, Avenida 2" disabled>
                        </div>

                        <div class="campo">
                            <label class="label-campo">Referencia</label>
                            <input type="text" class="campo-input" value="Frente al parque central, edificio azul" disabled>
                        </div>

                        <h5 class="seccion-titulo seccion-titulo-mt">DESCRIPCIÓN</h5>

                        <div class="campo">
                            <label class="label-campo">Descripción del alimento</label>
                            <textarea class="campo-input" rows="3" disabled>Delicioso arroz con pollo preparado hoy, incluye papas fritas y ensalada de lechuga, tomate, pepino, limón, zanahoria y aguacate.</textarea>
                        </div>

                        <div class="campo">
                            <label class="label-campo">Información de alérgenos</label>
                            <textarea class="campo-input" rows="2" disabled>Sin gluten. Contiene lactosa. Contiene huevo. Sin frutos secos.</textarea>
                        </div>

                        <div class="botones botones-izquierda">
                            <button type="button" class="btn-accion" id="btnReservar">Reservar Donación</button>
                        </div>

                        <div id="mensaje"></div>

                    </div>
                </div>
            </div>


        </main>
    </div>


</body>

</html>
