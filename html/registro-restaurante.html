<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlimentTICO - Nueva Donación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/autentificacion.css">
    <script src="../js/restaurante.js"></script>
</head>

<body>
    <header>
        <div class="header-logo">
            <img src="../img/donacion-de-alimentos.png" alt="logo" class="img-logo">
            <span class="logo-texto">Alimen<span class="logo-tico">TICO</span></span>
        </div>
        <nav>
            <a href="#inicio">Inicio</a>
            <a href="#nosotros">Sobre Nosotros</a>
        </nav>
        <a href="login.html" class="btn-header">Iniciar Sesión</a>
    </header>

    <main class="pagina-contenedor">

        <h1 class="titulo-pagina">FORMULARIO DE REGISTRO</h1>
        <p class="subtitulo-pagina">Registro de Restaurante, unete a la red solidario de Costa Rica</p>

        <form>
            <div class="formulario-card">
                    <div class="row">

                        <div class="col-md-6 col-izquierda">

                            <h5 class="seccion-titulo">INFORMACIÓN DEL NEGOCIO</h5>

                            <div class="campo">
                                <label for="nombreNegocio" class="label-campo">Nombre del Restaurante/Negocio</label>
                                <input type="text" class="campo-input" id="nombreNegocio" name="nombreNegocio" >
                            </div>

                            <div class="campo">
                                <label for="tipoEstablecimiento" class="label-campo">Tipo de Establecimiento</label>
                                <select class="campo-input" id="tipoEstablecimiento" name="tipoEstablecimiento">
                                    <option value="Restaurante" selected>Restaurante</option>
                                    <option value="Panadería">Panadería</option>
                                    <option value="Cafetería">Cafetería</option>
                                    <option value="Sodas">Sodas</option>
                                    <option value="Supermercado">Supermercado</option>
                                    <option value="Otro">Otro</option>
                                </select>
                            </div>

                            <div class="campo">
                                <label for="cedulaJuridica" class="label-campo">Cédula Jurídica</label>
                                <input type="text" class="campo-input" id="cedulaJuridica" name="cedulaJuridica">
                            </div>

                            <div class="campo">
                                <label for="telefono" class="label-campo">Teléfono del Negocio</label>
                                <input type="text" class="campo-input" id="telefono" name="telefono" >
                            </div>

                            <h5 class="seccion-titulo seccion-titulo-mt">HORARIO DE OPERACIÓN</h5>

                            <div class="campo fila-horario">
                                <div class="fila-horario-top">
                                    <span class="dia-label">Lunes:</span>
                                    <div class="form-check form-switch">
                                        <input class="form-check-input switch-dia" type="checkbox" id="switchLunes" checked>
                                        <label class="form-check-label label-estado" for="switchLunes" id="estadoLunes">Abierto</label>
                                    </div>
                                </div>
                                <div class="fila-horario-horas">
                                    <input type="time" class="campo-input input-hora" id="abreLunes" value="09:00">
                                    <span class="label-campo">a</span>
                                    <input type="time" class="campo-input input-hora" id="cierraLunes" value="20:30">
                                </div>
                            </div>

                            <div class="campo fila-horario">
                                <div class="fila-horario-top">
                                    <span class="dia-label">Martes:</span>
                                    <div class="form-check form-switch">
                                        <input class="form-check-input switch-dia" type="checkbox" id="switchMartes" checked>
                                        <label class="form-check-label label-estado" for="switchMartes" id="estadoMartes">Abierto</label>
                                    </div>
                                </div>
                                <div class="fila-horario-horas">
                                    <input type="time" class="campo-input input-hora" id="abreMartes" value="09:00">
                                    <span class="label-campo">a</span>
                                    <input type="time" class="campo-input input-hora" id="cierraMartes" value="20:30">
                                </div>
                            </div>

                            <div class="campo fila-horario">
                                <div class="fila-horario-top">
                                    <span class="dia-label">Miércoles:</span>
                                    <div class="form-check form-switch">
                                        <input class="form-check-input switch-dia" type="checkbox" id="switchMiercoles" checked>
                                        <label class="form-check-label label-estado" for="switchMiercoles" id="estadoMiercoles">Abierto</label>
                                    </div>
                                </div>
                                <div class="fila-horario-horas">
                                    <input type="time" class="campo-input input-hora" id="abreMiercoles" value="09:00">
                                    <span class="label-campo">a</span>
                                    <input type="time" class="campo-input input-hora" id="cierraMiercoles" value="20:30">
                                </div>
                            </div>

                            <div class="campo fila-horario">
                                <div class="fila-horario-top">
                                    <span class="dia-label">Jueves:</span>
                                    <div class="form-check form-switch">
                                        <input class="form-check-input switch-dia" type="checkbox" id="switchJueves" checked>
                                        <label class="form-check-label label-estado" for="switchJueves" id="estadoJueves">Abierto</label>
                                    </div>
                                </div>
                                <div class="fila-horario-horas">
                                    <input type="time" class="campo-input input-hora" id="abreJueves" value="09:00">
                                    <span class="label-campo">a</span>
                                    <input type="time" class="campo-input input-hora" id="cierraJueves" value="20:30">
                                </div>
                            </div>

                            <div class="campo fila-horario">
                                <div class="fila-horario-top">
                                    <span class="dia-label">Viernes:</span>
                                    <div class="form-check form-switch">
                                        <input class="form-check-input switch-dia" type="checkbox" id="switchViernes" checked>
                                        <label class="form-check-label label-estado" for="switchViernes" id="estadoViernes">Abierto</label>
                                    </div>
                                </div>
                                <div class="fila-horario-horas">
                                    <input type="time" class="campo-input input-hora" id="abreViernes" value="09:00">
                                    <span class="label-campo">a</span>
                                    <input type="time" class="campo-input input-hora" id="cierraViernes" value="20:30">
                                </div>
                            </div>

                            <div class="campo fila-horario">
                                <div class="fila-horario-top">
                                    <span class="dia-label">Sábado:</span>
                                    <div class="form-check form-switch">
                                        <input class="form-check-input switch-dia" type="checkbox" id="switchSabado" checked>
                                        <label class="form-check-label label-estado" for="switchSabado" id="estadoSabado">Abierto</label>
                                    </div>
                                </div>
                                <div class="fila-horario-horas">
                                    <input type="time" class="campo-input input-hora" id="abreSabado" value="10:00">
                                    <span class="label-campo">a</span>
                                    <input type="time" class="campo-input input-hora" id="cierraSabado" value="20:30">
                                </div>
                            </div>

                            <div class="campo fila-horario">
                                <div class="fila-horario-top">
                                    <span class="dia-label">Domingo:</span>
                                    <div class="form-check form-switch">
                                        <input class="form-check-input switch-dia" type="checkbox" id="switchDomingo">
                                        <label class="form-check-label label-estado" for="switchDomingo" id="estadoDomingo">Cerrado</label>
                                    </div>
                                </div>
                                <div class="fila-horario-horas">
                                    <input type="time" class="campo-input input-hora" id="abreDomingo" >
                                    <span class="label-campo">a</span>
                                    <input type="time" class="campo-input input-hora" id="cierraDomingo" >
                                </div>
                            </div>

                          

                        </div>

                        <div class="col-md-6">

                            <h5 class="seccion-titulo">UBICACIÓN </h5>

                            <div class="campo">
                                <label for="provincia" class="label-campo">Provincia</label>
                                <select class="campo-input" id="provincia" name="provincia">
                                    <option value="San José" selected>San José</option>
                                    <option value="Alajuela">Alajuela</option>
                                    <option value="Cartago">Cartago</option>
                                    <option value="Heredia">Heredia</option>
                                    <option value="Guanacaste">Guanacaste</option>
                                    <option value="Puntarenas">Puntarenas</option>
                                    <option value="Limón">Limón</option>
                                </select>
                            </div>

                            <div class="campo">
                                <label for="canton" class="label-campo">Cantón</label>
                                <input type="text" class="campo-input" id="canton" name="canton" >
                            </div>

                            <div class="campo">
                                <label for="distrito" class="label-campo">Distrito</label>
                                <input type="text" class="campo-input" id="distrito" name="distrito">
                            </div>

                            <div class="campo">
                                <label for="direccion" class="label-campo">Dirección Exacta</label>
                                <textarea class="campo-input" id="direccion" name="direccion" rows="3"></textarea>
                            </div>

                            <div class="campo">
                                <label for="googleMaps" class="label-campo">Link de Google Maps</label>
                                <input type="text" class="campo-input" id="googleMaps" name="googleMaps">
                            </div>

                            <h5 class="seccion-titulo seccion-titulo-mt">DATOS DE ACCESO</h5>

                            <div class="campo">
                                <label for="correo" class="label-campo">Correo Electrónico</label>
                                <input type="email" class="campo-input" id="correo" name="correo" >
                            </div>

                            <div class="campo">
                                <label for="contrasena" class="label-campo">Contraseña</label>
                                <input type="password" class="campo-input" id="contrasena" name="contrasena" >
                            </div>
                            <div class="campo">
                                <label for="confirmarContrasena" class="label-campo">Confirmar Contraseña</label>
                                <input type="password" class="campo-input" id="confirmarContrasena" name="confirmarContrasena">
                            </div>

                            

                        </div>
                    </div>
                    <div class="botones">
                        
                        <button type="submit" class="btn-accion">REGISTRAR</button>
                    </div>

                    <div id="mensaje"></div>
                    <hr>
                    <div class="iniciar-sesion">
                        <label class="label-campo">¿Ya tienes cuenta?</label>
                        <a href="login.html" class="iniciar-sesion-link">Iniciar Sesión</a>
                    </div>
                </div>
                
                
            </div>

        </form>

    </main>

</body>

</html>
